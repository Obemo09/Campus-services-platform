global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'campus-microservices'
    static_configs:
      - targets:
          - 'auth-service:5000'
          - 'booking-service:5001'
          - 'events-service:5002'
          - 'marketplace-service:5003'
    metrics_path: '/metrics'
