services:
  mongodb:
    image: mongo:7
    container_name: campus-mongodb
    volumes:
      - mongo-data:/data/db
    networks:
      - campus-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: campus-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    networks:
      - campus-network

  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    env_file:
      - ./services/api-gateway/.env
    ports:
      - '3000:3000'
    networks:
      - campus-network

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    env_file:
      - ./services/auth-service/.env
    ports:
      - '3001:3001'
    networks:
      - campus-network

  booking-service:
    build: ./services/booking-service
    container_name: booking-service
    env_file:
      - ./services/booking-service/.env
    ports:
      - '3002:3002'
    networks:
      - campus-network

  events-service:
    build: ./services/events-service
    container_name: events-service
    env_file:
      - ./services/events-service/.env
    ports:
      - '3003:3003'
    networks:
      - campus-network

  marketplace-service:
    build: ./services/marketplace-service
    container_name: marketplace-service
    env_file:
      - ./services/marketplace-service/.env
    ports:
      - '3004:3004'
    networks:
      - campus-network

  lost-found-service:
    build: ./services/lost-found-service
    container_name: lost-found-service
    env_file:
      - ./services/lost-found-service/.env
    ports:
      - '3005:3005'
    networks:
      - campus-network

  carpooling-service:
    build: ./services/carpooling-service
    container_name: carpooling-service
    env_file:
      - ./services/carpooling-service/.env
    ports:
      - '3006:3006'
    networks:
      - campus-network

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    env_file:
      - ./services/notification-service/.env
    ports:
      - '3007:3007'
    networks:
      - campus-network

volumes:
  mongo-data:

networks:
  campus-network:
    driver: bridge
