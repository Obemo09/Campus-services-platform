services:
  mongodb:
    image: mongo:7
    container_name: campus-mongodb
    volumes:
      - mongo-data:/data/db
    networks:
      - campus-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: campus-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    networks:
      - campus-network

  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    env_file:
      - ./services/api-gateway/.env
    ports:
      - '3000:3000'
    networks:
      - campus-network

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    env_file:
      - ./services/auth-service/.env
    ports:
      - '3001:3001'
    networks:
      - campus-network

  booking-service:
    build: ./services/booking-service
    container_name: booking-service
    env_file:
      - ./services/booking-service/.env
    ports:
      - '3002:3002'
    networks:
      - campus-network

  events-service:
    build: ./services/events-service
    container_name: events-service
    env_file:
      - ./services/events-service/.env
    ports:
      - '3003:3003'
    networks:
      - campus-network

  marketplace-service:
    build: ./services/marketplace-service
    container_name: marketplace-service
    env_file:
      - ./services/marketplace-service/.env
    ports:
      - '3004:3004'
    networks:
      - campus-network

  lost-found-service:
    build: ./services/lost-found-service
    container_name: lost-found-service
    env_file:
      - ./services/lost-found-service/.env
    ports:
      - '3005:3005'
    networks:
      - campus-network

  carpooling-service:
    build: ./services/carpooling-service
    container_name: carpooling-service
    env_file:
      - ./services/carpooling-service/.env
    ports:
      - '3006:3006'
    networks:
      - campus-network

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    env_file:
      - ./services/notification-service/.env
    ports:
      - '3007:3007'
    networks:
      - campus-network

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - '9000:9000'
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonar-db:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    depends_on:
      - sonar-db
    networks:
      - campus-network
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs

  sonar-db:
    image: postgres:15
    container_name: sonar-db
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonar
    networks:
      - campus-network
    volumes:
      - sonar_db_data:/var/lib/postgresql/data

volumes:
  mongo-data:
  sonarqube_data:
  sonarqube_logs:
  sonar_db_data:

networks:
  campus-network:
    driver: bridge
